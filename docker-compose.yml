version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: farmacia_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farmacia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmacia_api
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/farmacia_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  # O frontend Qt5 requer display e deve ser executado localmente:
  #   python main.py

volumes:
  postgres_data:

networks:
  default:
    name: farmacia_network
